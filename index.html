<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rekapan Uang Kas</title>

<style>
body{
    font-family:Arial, sans-serif;
    background:#f3f4f6;
    padding:20px;
}
.container{
    max-width:1200px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:12px;
}
h1{text-align:center;margin-bottom:10px}

.summary{
    background:#4f46e5;
    color:#fff;
    padding:15px;
    border-radius:10px;
    text-align:center;
    margin-bottom:15px;
}

form{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:10px;
    margin-bottom:15px;
}
input,button{
    padding:10px;
    border-radius:6px;
    border:1px solid #ccc;
}
button{
    background:#22c55e;
    color:white;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

table{
    width:100%;
    border-collapse:collapse;
    font-size:14px;
}
th,td{
    border:1px solid #ddd;
    padding:8px;
    text-align:center;
}
th{
    background:#4f46e5;
    color:white;
}

.footer{
    text-align:center;
    margin-top:15px;
    font-size:14px;
    color:#666;
}
</style>
</head>

<body>

<div class="container">
<h1>📒 Rekapan Uang Kas</h1>

<div class="summary">
    <h3>Total Saldo</h3>
    <h2 id="totalSaldo">Rp 0</h2>
</div>

<form onsubmit="tambahData(); return false;">
    <input id="tanggal" placeholder="Tanggal (4-2-2026)" required>
    <input id="nama" placeholder="Nama Siswa" required>
    <input id="masuk" type="number" placeholder="Uang Masuk" required>
    <input id="keluar" type="number" placeholder="Pengeluaran" value="0">
    <input id="alasan" placeholder="Alasan Pengeluaran (wajib jika ada)">
    <button type="submit">Tambah Data</button>
</form>

<table>
<thead>
<tr>
    <th>No</th>
    <th>Tanggal</th>
    <th>Nama</th>
    <th>Masuk</th>
    <th>Keluar</th>
    <th>Alasan Pengeluaran</th>
    <th>Saldo</th>
</tr>
</thead>
<tbody id="tabel"></tbody>
</table>

<div class="footer">
    Data kosong dari awal | Siap GitHub Pages
</div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("kas")) || [];

function simpan(){
    localStorage.setItem("kas", JSON.stringify(data));
}

function tampil(){
    let tabel = document.getElementById("tabel");
    tabel.innerHTML = "";
    let total = 0;

    data.forEach((d,i)=>{
        let saldo = d.masuk - d.keluar;
        total += saldo;

        tabel.innerHTML += `
        <tr>
            <td>${i+1}</td>
            <td>${d.tanggal}</td>
            <td>${d.nama}</td>
            <td>Rp ${d.masuk}</td>
            <td>Rp ${d.keluar}</td>
            <td>${d.alasan || "-"}</td>
            <td>Rp ${saldo}</td>
        </tr>`;
    });

    document.getElementById("totalSaldo").innerText = "Rp " + total;
}

function tambahData(){
    let tanggal = document.getElementById("tanggal").value;
    let nama = document.getElementById("nama").value;
    let masuk = Number(document.getElementById("masuk").value);
    let keluar = Number(document.getElementById("keluar").value);
    let alasan = document.getElementById("alasan").value;

    if(keluar > 0 && alasan.trim() === ""){
        alert("Alasan pengeluaran wajib diisi!");
        return;
    }

    data.push({tanggal, nama, masuk, keluar, alasan});

    simpan();
    tampil();

    document.getElementById("tanggal").value="";
    document.getElementById("nama").value="";
    document.getElementById("masuk").value="";
    document.getElementById("keluar").value="0";
    document.getElementById("alasan").value="";
}

tampil();
</script>

</body>
</html>
