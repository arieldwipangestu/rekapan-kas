<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rekapan Uang Kas Kelas</title>

<style>
body{
    font-family:Arial, sans-serif;
    background:#f3f4f6;
    padding:20px;
}
.container{
    max-width:1000px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:12px;
}
h1{text-align:center;margin-bottom:10px}
.summary{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:15px;
}
.box{
    flex:1;
    background:#4f46e5;
    color:white;
    padding:15px;
    border-radius:10px;
    text-align:center;
}
form{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:10px;
    margin-bottom:15px;
}
input,button{
    padding:10px;
    border-radius:6px;
    border:1px solid #ccc;
}
button{
    background:#22c55e;
    color:white;
    border:none;
    cursor:pointer;
}
table{
    width:100%;
    border-collapse:collapse;
}
th,td{
    border:1px solid #ddd;
    padding:8px;
    text-align:center;
}
th{
    background:#4f46e5;
    color:white;
}
.footer{
    text-align:center;
    margin-top:15px;
    color:#666;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">
<h1>📒 Rekapan Uang Kas Kelas</h1>

<div class="summary">
    <div class="box">
        <h3>Total Saldo</h3>
        <h2 id="totalSaldo">Rp 0</h2>
    </div>
</div>

<form onsubmit="tambahData(); return false;">
    <input id="nama" placeholder="Nama Siswa" required>
    <input id="masuk" type="number" placeholder="Uang Masuk" required>
    <input id="keluar" type="number" placeholder="Pengeluaran" value="0">
    <button type="submit">Tambah / Update</button>
</form>

<table>
<thead>
<tr>
    <th>No</th>
    <th>Nama</th>
    <th>Masuk</th>
    <th>Keluar</th>
    <th>Saldo</th>
</tr>
</thead>
<tbody id="tabel"></tbody>
</table>

<div class="footer">
    Data tersimpan otomatis | Siap GitHub Pages
</div>
</div>

<script>
const siswaAwal = [
"Aldino","Alfian","Andi","Aqila","Ariel","Asmarani","Aydin","Azra",
"Belva","Brian","Budi","Cahya","Dafa","Dinda","Eka","Fahri","Farah",
"Gilang","Hana","Iqbal","Intan","Jihan","Karin","Kevin","Lutfi",
"Maya","Nabila","Naufal","Putri","Raka","Rani","Rizki","Salsa",
"Satria","Tania","Vina","Zaki"
];

let data = JSON.parse(localStorage.getItem("kas")) || siswaAwal.map(n=>({
    nama:n, masuk:0, keluar:0
}));

function simpan(){
    localStorage.setItem("kas",JSON.stringify(data));
}

function tampil(){
    let tabel = document.getElementById("tabel");
    tabel.innerHTML="";
    let total = 0;

    data.forEach((d,i)=>{
        let saldo = d.masuk - d.keluar;
        total += saldo;
        tabel.innerHTML += `
        <tr>
            <td>${i+1}</td>
            <td>${d.nama}</td>
            <td>Rp ${d.masuk}</td>
            <td>Rp ${d.keluar}</td>
            <td>Rp ${saldo}</td>
        </tr>`;
    });

    document.getElementById("totalSaldo").innerText = "Rp " + total;
}

function tambahData(){
    let nama = document.getElementById("nama").value;
    let masuk = Number(document.getElementById("masuk").value);
    let keluar = Number(document.getElementById("keluar").value);

    let siswa = data.find(d=>d.nama.toLowerCase()==nama.toLowerCase());

    if(siswa){
        siswa.masuk += masuk;
        siswa.keluar += keluar;
    }else{
        data.push({nama,masuk,keluar});
    }

    simpan();
    tampil();

    document.getElementById("nama").value="";
    document.getElementById("masuk").value="";
    document.getElementById("keluar").value="0";
}

tampil();
</script>

</body>
</html>
