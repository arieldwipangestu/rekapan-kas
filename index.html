<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rekapan Uang Kas</title>

<style>
body{
    font-family:Arial, sans-serif;
    background:#f3f4f6;
    padding:20px;
}
.container{
    max-width:1200px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:12px;
}
h1{text-align:center}

.summary{
    background:#4f46e5;
    color:white;
    padding:15px;
    border-radius:10px;
    text-align:center;
    margin-bottom:15px;
}

form{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:10px;
    margin-bottom:15px;
}
input,button{
    padding:10px;
    border-radius:6px;
    border:1px solid #ccc;
}
button{
    background:#22c55e;
    color:white;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
    font-size:14px;
}
th,td{
    border:1px solid #ddd;
    padding:8px;
    text-align:center;
}
th{
    background:#4f46e5;
    color:white;
}
</style>
</head>

<body>

<div class="container">
<h1>📒 Rekapan Uang Kas</h1>

<div class="summary">
    <h3>Total Saldo</h3>
    <h2 id="totalSaldo">Rp 0</h2>
</div>

<form onsubmit="tambahData(); return false;">
    <input id="tanggal" placeholder="Tanggal (4-2-2026)" required>
    <input id="nama" placeholder="Nama Siswa" required>
    <input id="masuk" type="number" placeholder="Uang Masuk" required>
    <input id="keluar" type="number" placeholder="Pengeluaran" value="0">
    <input id="alasan" placeholder="Alasan Pengeluaran">
    <button type="submit">Tambah Data</button>
</form>

<table>
<thead>
<tr>
    <th>No</th>
    <th>Tanggal</th>
    <th>Nama</th>
    <th>Masuk</th>
    <th>Keluar</th>
    <th>Alasan</th>
    <th>Saldo</th>
</tr>
</thead>
<tbody id="tabel"></tbody>
</table>
</div>

<script>
// 🔥 KEY BARU → DATA KOSONG TOTAL
const STORAGE_KEY = "kas_v2";

let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

function simpan(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function tampil(){
    let tabel = document.getElementById("tabel");
    tabel.innerHTML="";
    let total=0;

    data.forEach((d,i)=>{
        let saldo = d.masuk - d.keluar;
        total += saldo;

        tabel.innerHTML += `
        <tr>
            <td>${i+1}</td>
            <td>${d.tanggal}</td>
            <td>${d.nama}</td>
            <td>Rp ${d.masuk}</td>
            <td>Rp ${d.keluar}</td>
            <td>${d.alasan || "-"}</td>
            <td>Rp ${saldo}</td>
        </tr>`;
    });

    document.getElementById("totalSaldo").innerText = "Rp " + total;
}

function tambahData(){
    let tanggal = tanggalEl.value;
    let nama = namaEl.value;
    let masuk = Number(masukEl.value);
    let keluar = Number(keluarEl.value);
    let alasan = alasanEl.value;

    if(keluar > 0 && alasan.trim()===""){
        alert("Alasan pengeluaran wajib diisi!");
        return;
    }

    data.push({tanggal,nama,masuk,keluar,alasan});
    simpan();
    tampil();

    tanggalEl.value="";
    namaEl.value="";
    masukEl.value="";
    keluarEl.value=0;
    alasanEl.value="";
}

const tanggalEl = document.getElementById("tanggal");
const namaEl = document.getElementById("nama");
const masukEl = document.getElementById("masuk");
const keluarEl = document.getElementById("keluar");
const alasanEl = document.getElementById("alasan");

tampil();
</script>

</body>
</html>
